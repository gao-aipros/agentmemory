<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentMemory v2 Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.5rem 2rem; background: #1e293b; border-bottom: 1px solid #334155;
        }
        header h1 { font-size: 1.5rem; font-weight: 600; color: #f1f5f9; }
        .status {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.875rem;
        }
        .status.connected { background: #065f46; color: #6ee7b7; }
        .status.disconnected { background: #7f1d1d; color: #fca5a5; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .status.connected .status-dot { background: #6ee7b7; }
        .status.disconnected .status-dot { background: #fca5a5; animation: pulse 1s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        main { padding: 2rem; }
        .card {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px;
            padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .card h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem; color: #94a3b8; }
        .event-list { max-height: 500px; overflow-y: auto; }
        .event {
            padding: 0.75rem; border-bottom: 1px solid #334155;
            display: flex; gap: 1rem; align-items: flex-start;
        }
        .event:last-child { border-bottom: none; }
        .event-time { color: #64748b; font-size: 0.75rem; white-space: nowrap; min-width: 80px; }
        .event-type {
            background: #334155; color: #94a3b8; padding: 0.125rem 0.5rem;
            border-radius: 4px; font-size: 0.75rem; font-weight: 500;
        }
        .event-data { font-size: 0.875rem; color: #cbd5e1; flex: 1; }
        .empty-state {
            text-align: center; padding: 3rem; color: #64748b;
        }
        .empty-state p { margin-top: 0.5rem; }
        .quick-stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px;
            padding: 1.25rem; text-align: center;
        }
        .stat-value { font-size: 2rem; font-weight: 700; color: #38bdf8; }
        .stat-label { font-size: 0.875rem; color: #64748b; margin-top: 0.25rem; }
        footer {
            text-align: center; padding: 1.5rem; color: #475569;
            font-size: 0.875rem; border-top: 1px solid #1e293b;
        }
    </style>
</head>
<body>
    <header>
        <h1>AgentMemory v2 Viewer</h1>
        <div id="connection-status" class="status disconnected">
            <span class="status-dot"></span>
            <span id="status-text">Disconnected</span>
        </div>
    </header>

    <main>
        <div class="quick-stats">
            <div class="stat-card">
                <div class="stat-value" id="stat-sessions">-</div>
                <div class="stat-label">Active Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-observations">-</div>
                <div class="stat-label">Observations</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-memories">-</div>
                <div class="stat-label">Memories</div>
            </div>
        </div>

        <div class="card">
            <h2>Session Events</h2>
            <div id="event-container" class="event-list">
                <div class="empty-state">
                    <p>No events received yet.</p>
                    <p>Connect via WebSocket to see session events in real-time.</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        AgentMemory v2.0.0 &mdash; Persistent Memory for Coding Agents
    </footer>

    <script>
        const statusDot = document.getElementById('connection-status');
        const statusText = document.getElementById('status-text');
        const eventContainer = document.getElementById('event-container');

        function setStatus(connected) {
            if (connected) {
                statusDot.className = 'status connected';
                statusText.textContent = 'Connected';
            } else {
                statusDot.className = 'status disconnected';
                statusText.textContent = 'Disconnected';
            }
        }

        function addEvent(type, data) {
            const empty = eventContainer.querySelector('.empty-state');
            if (empty) empty.remove();

            const now = new Date();
            const time = now.toLocaleTimeString();

            const eventDiv = document.createElement('div');
            eventDiv.className = 'event';
            eventDiv.innerHTML = `
                <span class="event-time">${time}</span>
                <span class="event-type">${type}</span>
                <span class="event-data">${data}</span>
            `;
            eventContainer.insertBefore(eventDiv, eventContainer.firstChild);

            // Keep max 50 events
            while (eventContainer.children.length > 50) {
                eventContainer.lastChild.remove();
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/v1/socket`;
            const token = localStorage.getItem('agentmemory_token');

            if (!token) {
                addEvent('info', 'No session token found. Set localStorage.agentmemory_token to connect.');
                return;
            }

            const ws = new WebSocket(`${wsUrl}?token=${encodeURIComponent(token)}`);

            ws.onopen = () => {
                setStatus(true);
                addEvent('connection', 'WebSocket connected');
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    addEvent(msg.type || 'event', JSON.stringify(msg.data || msg));
                } catch {
                    addEvent('event', event.data);
                }
            };

            ws.onclose = () => {
                setStatus(false);
                addEvent('connection', 'WebSocket disconnected. Reconnecting in 5s...');
                setTimeout(connectWebSocket, 5000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
        }

        // Attempt connection on page load
        connectWebSocket();
    </script>
</body>
</html>
