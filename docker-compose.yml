services:
  db:
    image: paradedb/paradedb:0.24.1-pg18
    environment:
      POSTGRES_USER: agentmemory
      POSTGRES_PASSWORD: agentmemory
      POSTGRES_DB: agentmemory
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmemory"]
      interval: 5s
      retries: 5
  agentmemory:
    build: .
    ports: ["8080:8080"]
    env_file: .env
    environment:
      DB_URL: postgres://agentmemory:agentmemory@db:5432/agentmemory?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      MIGRATE_ON_STARTUP: "true"
      COMPRESSION_INTERVAL_MINUTES: ${COMPRESSION_INTERVAL_MINUTES:-60}
      SUMMARIZATION_INTERVAL_MINUTES: ${SUMMARIZATION_INTERVAL_MINUTES:-120}
      CONSOLIDATION_INTERVAL_MINUTES: ${CONSOLIDATION_INTERVAL_MINUTES:-360}
      REFLECTION_INTERVAL_MINUTES: ${REFLECTION_INTERVAL_MINUTES:-1440}
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata:
